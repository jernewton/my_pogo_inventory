  if (a !== "0ProfessorFig") {
    friendships.push(["0ProfessorFig", a]);
  }
});
// Normalize lookup
const friendSet = new Set(
  friendships.map(([a, b]) => [a, b].sort().join("|"))
);

// =======================
// 3. Build ALL possible pairs
// =======================
const allPairs = [];

for (let i = 0; i < accounts.length; i++) {
  for (let j = i + 1; j < accounts.length; j++) {
    const a = accounts[i];
    const b = accounts[j];

    const key = [a, b].sort().join("|");

    if (!friendSet.has(key)) {
      allPairs.push([a, b]); // THIS IS A MISSING EDGE
    }
  }
}

// =======================
// 4. Count missing edges per node
// =======================
const missingCount = {};
accounts.forEach(a => missingCount[a] = 0);

allPairs.forEach(([a, b]) => {
  missingCount[a]++;
  missingCount[b]++;
});

// REMOVE FULLY CONNECTED NODES
const activeAccounts = accounts.filter(a => missingCount[a] > 0);

// =======================
// 5. Ring layout (only active nodes)
// =======================
const radius = 300;

const nodes = activeAccounts.map((a, i) => {
  const angle = (2 * Math.PI * i) / activeAccounts.length;

  return {
    id: a,
    label: `${a}\n(${missingCount[a]})`,
    x: radius * Math.cos(angle),
    y: radius * Math.sin(angle),
    fixed: true
  };
});

// =======================
// 6. Missing edges ONLY
// =======================
const edges = allPairs
  .filter(([a, b]) =>
    missingCount[a] > 0 && missingCount[b] > 0
  )
  .map(([a, b]) => ({
    from: a,
    to: b,
    color: { color: "#cccccc" },
    dashes: true
  }));

// =======================
// 7. Render
// =======================
const container = document.getElementById("network");

new vis.Network(container, { nodes, edges }, {
  physics: false
});
